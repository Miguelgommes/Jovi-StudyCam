<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jovi StudyCam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./Css/style.css">
</head>

<body>

  <div class="camera">

    <div class="card">

      <div class="card-top">

        <div class="icon">▦</div>

        <div>

          <p>Detectamos um quadro. Deseja escanear?</p>
        </div>

      </div>

      <a href="./opc.html" class="btn">
        Ver opções
      </a>

    </div>

    <div class="scan-box"></div>

    <div class="bottom">

      <div class="modes">
        <h2>Noite</h2>
        <h2>Retrato</h2>
        <h2 class="active">Foto</h2>
        <h2>Vídeo</h2>
      </div>

      <div class="controls">

        <a href="./galeria.html" class="small-btn">
          📖
        </a>

        <a href="./opc.html" class="capture"></a>

        <a href="" class="rotate">
          ↻
        </a>

      </div>

    </div>

  </div>

</html>
