<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anotações</title>
  <link rel="stylesheet" href="./Css/style_galeria.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
</head>

<body>

  <div class="container">

    <div class="topo">

      <a href="./index.html" class="btn-voltar">
        ←
      </a>

      <input type="text" placeholder="Buscar anotações..." class="buscar">

    </div>

    <div class="card-total">

      <div>

        <h2>Total de anotações</h2>

        <h1>85</h1>

        <div class="infos">

          <div>
            <p>Esta semana</p>
            <strong>12 novas</strong>
          </div>

          <div class="linha"></div>

          <div>
            <p>Este mês</p>
            <strong>47 novas</strong>
          </div>

        </div>

      </div>

      <div class="icone-card">
        📅
      </div>

    </div>

    <div class="titulo-materia">

      <h2>Por Matéria</h2>

      <a href="./index.html" class="ver-todas">
        Ver todas
      </a>

    </div>

    <div class="lista">

      <div class="item">

        <div class="icone azul">⌗</div>

        <div class="conteudo">
          <h3>Cálculo</h3>
          <h2>24 anotações</h2>

          <p>🟢 Hoje, 14:30</p>
        </div>

        <div class="seta">›</div>

      </div>

      <div class="item">

        <div class="icone roxo">⚛</div>

        <div class="conteudo">
          <h3>Física</h3>
          <h2>18 anotações</h2>

          <p>🟣 Ontem, 10:15</p>
        </div>

        <div class="seta">›</div>

      </div>

      <div class="item">

        <div class="icone verde">‹ ›</div>

        <div class="conteudo">
          <h3>Programação</h3>
          <h2>31 anotações</h2>

          <p>🟢 Há 2 dias</p>
        </div>

        <div class="seta">›</div>

      </div>

    </div>

    <a href="#" class="btn-add">
      +
    </a>

  </div>

</body>

</html>
